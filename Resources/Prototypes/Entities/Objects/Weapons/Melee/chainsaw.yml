- type: entity
  parent: [SolutionWelder, SolutionToolNormal]
  id: SolutionToolChainsaw
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 300
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 300

- type: entity
  name: chainsaw
  parent: [BaseItem, SolutionToolChainsaw]
  id: Chainsaw
  description: A very large chainsaw. Usually you use this for cutting down trees... usually.
  components:
  - type: Wieldable
    wieldSound: !type:SoundPathSpecifier
      path: /Audio/Weapons/chainsaw_pull.ogg
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/chainsaw.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 4
    damage:
      types:
        Slash: 2
        Blunt: 2
        Structural: 4
    soundHit:
      path: /Audio/Weapons/chainsaw_rev.ogg
      params:
        volume: -2
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 4
        Structural: 4
  - type: Item
    size: Normal
    sprite: Objects/Weapons/Melee/chainsaw.rsi
  - type: DisarmMalus
  - type: RefillableSolution
    solution: welder
  - type: UseDelay
    delay: 1
  - type: BoneSaw # Shitmed
    speed: 0.5 # TODO: arm-mounted version becomes 0.65
  - type: SurgeryTool # Shitmed
    startSound:
      path: /Audio/Weapons/chainsaw_pull.ogg
    endSound:
      path: /Audio/Weapons/chainsaw_rev.ogg
