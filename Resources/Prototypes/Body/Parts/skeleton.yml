- type: entity
  id: PartSkeleton
  parent: BasePart
  name: "skeleton body part"
  abstract: true
  components:
  - type: WoundableVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#555555AA"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
    bleedingOverlay: Mobs/Effects/bleeding_damage.rsi
  - type: Damageable
  - type: BodyPart
  - type: ContainerContainer
    containers:
      bodypart: !type:Container
        ents: []
  - type: StaticPrice
    price: 20
  - type: Tag
    tags:
      - Trash

- type: entity
  id: ChestSkeleton
  name: "skeleton chest"
  parent: [BaseChest, PartSkeleton]
  components:
  - type: Sprite
    sprite: Mobs/Species/Skeleton/parts.rsi
    state: torso_m
  - type: Icon
    sprite: Mobs/Species/Skeleton/parts.rsi
    state: torso_m

- type: entity
  id: HeadSkeleton
  name: "skull"
  description: Alas poor Yorick...
  parent: [ PartSkeleton, BaseMob ]
  components:
  - type: Sprite
    sprite: Mobs/Species/Skeleton/parts.rsi
    state: skull_icon
  - type: Icon
    sprite: Mobs/Species/Skeleton/parts.rsi
    state: skull_icon
  - type: BodyPart
    partType: Head
  - type: BlockMovement
  - type: Input
    context: "human"
  - type: Speech
    speechVerb: Skeleton
    speechSounds: Alto
  - type: SkeletonAccent
  - type: Actions
  - type: Vocal
    sounds:
      Male: Skeleton
      Female: Skeleton
      Unsexed: Skeleton
  - type: Emoting
  - type: Grammar
    attributes:
      proper: true
  - type: Examiner
  - type: DoAfter
  - type: MobState
    allowedStates:
      - Alive
  - type: Tag
    tags:
      - MindTransferTarget
      - Head

