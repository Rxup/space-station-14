# Per-organ definitions moved to Resources/Prototypes/Body/Species/human.yml (nubody).
# BaseHumanOrgan kept for Backmen/Lavaland organ prototypes.

- type: entity
  id: BaseHumanOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: EmitSoundOnPickup
    sound:
      collection: OrganInteraction
  - type: EmitSoundOnDrop
    sound:
      collection: OrganInteraction
  - type: EmitSoundOnLand
    sound:
      collection: OrganInteraction
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
  - type: Organ
    intCap: 15
    integrity: 15
    integrityThresholds:
      Normal: 15
      Damaged: 6
      Destroyed: 0
  - type: Edible
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
    - people
  - type: Tag
    tags:
    - Meat
