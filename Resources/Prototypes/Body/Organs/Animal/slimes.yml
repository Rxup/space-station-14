- type: entity
  id: SentientSlimesCore
  parent: [BaseItem, OrganHumanBrain]
  name: sentient slimes core
  description: "The source of incredible, unending gooeyness."
  components:
    - type: Sprite
      sprite: Mobs/Species/Slime/organs.rsi
      state: brain-slime
    - type: Stomach
    - type: Organ
      # backmen edit
      intCap: 60 # to prevent slimes from getting oneshot
      integrity: 60
      integrityThresholds:
        Normal: 60
        Damaged: 27
        Destroyed: 0
      slotId: core
    - type: Metabolizer
      stages: [ Digestion, Bloodstream ]
      maxReagents: 3
      metabolizerTypes: [ Slime ]
    - type: SolutionContainerManager
      solutions:
        stomach:
          maxVol: 30.0
        food:
          maxVol: 5
          reagents:
          - ReagentId: GreyMatter
            Quantity: 5

- type: entity
  id: OrganSlimesLungs
  parent: [ OrganBaseLungs, BaseHumanOrgan ]
  name: slimes gas sacs
  description: "Collects nitrogen, which slime cells use for maintenance."
  components:
    - type: Sprite
      sprite: Mobs/Species/Slime/organs.rsi
      layers:
        - state: lung-l
        - state: lung-r
    - type: Lung
      alert: LowNitrogen
    - type: Organ
      # backmen edit
      intCap: 28
      integrity: 28
      integrityThresholds:
        Normal: 28
        Damaged: 16
        Destroyed: 0
      slotId: lungs
    - type: Metabolizer
      stages: [ Respiration ]
      metabolizerTypes: [ Slime ]
    - type: SolutionContainerManager
      solutions:
        organ:
          reagents:
          - ReagentId: Nutriment
            Quantity: 10
        food:
          maxVol: 5
          reagents:
          - ReagentId: Slime
            Quantity: 5
