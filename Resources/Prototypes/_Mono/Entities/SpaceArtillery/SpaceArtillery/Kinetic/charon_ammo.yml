# CHARON
- type: entity
  id: ShipRailgunProjectile
  name: M381 CHARON 280mm 26.5 kg slug
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 90000
        Blunt: 5000
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
  - type: Ammo
    muzzleFlash: null
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#CF0E0E"
    scale: 4
    requireNoGrid: true
    shape: triangle
  - type: TimedDespawn
    lifetime: 1.7
  - type: PointLight
    color: "#19AFFF"
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HardBombShipGun
    totalIntensity: 7500
    intensitySlope: 100
    maxIntensity: 6000
  - type: GatheringProjectile

- type: entity
  id: CharonSlugAmmo
  name: M381 CHARON 280mm 26.5kg slug cartridge
  description: A all-in-one package containing the plasma gas for ionization in the linear accelerator and the slug itself.
  parent: BaseGrenade
  components:
  - type: Tag
    tags:
    - CharonSlug
  - type: Item
    size: Huge
  - type: CartridgeAmmo
    proto: ShipRailgunProjectile
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Explosives/charonslug.rsi
    layers:
    - state: railgun_slug
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals

