# VESPERA
- type: entity
  id: ShipMissileASM417
  name: ASM-417 Mini Missile
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 450
        Blunt: 65
        Heat: 10
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/mini_rocket.rsi
    layers:
    - state: mini-rocket
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectSmall
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#FCBA03"
    scale: 1
    requireNoGrid: true
    shape: triangle
  - type: TimedDespawn
    lifetime: 3.5
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: DefaultShipGun
    totalIntensity: 75
    intensitySlope: 8
    maxIntensity: 25
  - type: GatheringProjectile
  - type: TargetSeeking
    acceleration: 300
    detectionRange: 500
    scanArc: 35
    launchSpeed: 150
    maxSpeed: 180
    trackDelay: 0.1

