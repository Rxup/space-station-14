# LuaWorld violet ship lasers (minimal port for LuaTech turrets)

- type: entity
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  id: VioletLaserDefence
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 8
  - type: HitscanRadarSignature
    radarColor: "#c24bfa"
  - type: HitscanBasicRaycast
    maxDistance: 800
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: muzzle_beam_violet
    travelFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: beam_violet
    impactFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: impact_beam_violet

- type: entity
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  id: VioletLaserShip
  components:
  - type: HitscanRadarSignature
    radarColor: "#c24bfa"
  - type: HitscanBasicDamage
    damage:
      types:
        Structural: 65
        Heat: 75
  - type: HitscanSpawnEntity
    spawnedEntity: VioletLaserExplosion
  - type: HitscanBasicRaycast
    maxDistance: 800
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: muzzle_beam_violet
    travelFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: beam_violet
    impactFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: impact_beam_violet

- type: entity
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  id: VioletBigLaserShip
  components:
  - type: HitscanRadarSignature
    radarColor: "#c24bfa"
    lineThickness: 3
  - type: HitscanBasicDamage
    damage:
      types:
        Structural: 10
        Heat: 10
  - type: HitscanSpawnEntity
    spawnedEntity: VioletBigLaserExplosion
  - type: HitscanBasicRaycast
    maxDistance: 800
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/bigviolethit.rsi
      state: muzzle_beam_violet
    travelFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/bigviolethit.rsi
      state: beam_violet
    impactFlash:
      sprite: _Lua/Objects/Weapons/Guns/Projectiles/bigviolethit.rsi
      state: impact_beam_violet

- type: entity
  id: VioletLaserExplosion
  categories: [ HideSpawnMenu, Spawner ]
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HardBombShipGun
    totalIntensity: 100
    intensitySlope: 90
    maxIntensity: 80
    maxTileBreak: 2

- type: entity
  id: VioletBigLaserExplosion
  categories: [ HideSpawnMenu, Spawner ]
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HardBombShipGun
    totalIntensity: 700
    intensitySlope: 10
    maxIntensity: 1000
    maxTileBreak: 2
