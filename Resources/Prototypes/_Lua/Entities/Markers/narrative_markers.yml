#region мастер 1
#приветствие должно быть в первые 5 минут, поэтому первый разбит на два этапа
- type: entity
  name: стартовый нарратор Бархана-8
  id: MarkerMasterNarrative
  parent: MarkerBase
  suffix: "НЕ МАППИТЬ, НЕ СПАВНИТЬ"
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/pens.rsi
      state: pen_centcom
  - type: TimedSpawner
    prototypes:
    - ActorNarrative1
    chance: 1
    intervalSeconds: 290
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 310
  - type: SpawnOnDespawn
    prototype: MarkerSlaveNarrative0_5

#region актёр 1
- type: entity
  parent: BaseMobHuman
  id: ActorNarrative1
  name: Григорий Козловский
  categories: [ HideSpawnMenu ]
  components:
  - type: TTS
    enabled: true
    voice: Avallach
  - type: Vocalizer
    minVocalizeInterval: 20
    maxVocalizeInterval: 40
  - type: DatasetVocalizer
    dataset: ActorChatter1
  - type: TimedDespawn
    lifetime: 45
  - type: Loadout
    prototypes:
    - ActorGear1
  - type: Godmode

- type: startingGear
  id: ActorGear1
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
    shoes: ClothingShoesColorBlack
    id: CaptainPDA

- type: localizedDataset
  id: ActorChatter1
  values:
    prefix: ActorMarkerNarrative1-chat-
    count: 10


