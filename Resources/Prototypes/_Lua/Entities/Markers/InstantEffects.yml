- type: entity
  name: моментальный эффект
  suffix: "огненная бомба"
  parent: MarkerBase
  id: AdminInstantEffectFireBomb
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 40
    intensitySlope: 5
    maxIntensity: 3
    canCreateVacuum: false
  - type: TriggerOnSpawn
  - type: TimedDespawn
    lifetime: 1

