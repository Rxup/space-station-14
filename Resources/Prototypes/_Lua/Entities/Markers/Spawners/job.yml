- type: entity
  parent: SpawnPointJobBase
  id: SpawnPointValetLJ
  name: Консьерж
  suffix: LateJoin, Консьерж
  components:
    - type: SpawnPoint
      job_id: Valet
      spawn_type: LateJoin
    - type: Sprite
      sprite: Backmen/Markers/jobs.rsi
      layers:
        - state: green
        - state: jobicon

