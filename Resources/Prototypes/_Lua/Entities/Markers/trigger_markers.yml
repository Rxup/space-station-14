#region 20 минут
#
#
#
#
#
#region мастер 1
- type: entity
  name: стартовый триггер Бархана-8
  id: MarkerMasterTrigger
  parent: MarkerBase
  suffix: "НЕ МАППИТЬ, НЕ СПАВНИТЬ"
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: TimedSpawner
    prototypes:
    - MarkerTriggerLvl1
    chance: 0.1
    intervalSeconds: 550
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 1200
  - type: SpawnOnDespawn
    prototype: MarkerSlaveTrigger1

- type: entity
  parent: MarkerBase
  id: MarkerTriggerLvl1
  name: MarkerTriggerLvl1
  categories: [ HideSpawnMenu ]
  components:
  - type: RandomSpawner
    prototypes:
    - AdminInstantEffectFlash
    - AdminInstantEffectSmoke3
    - AdminInstantEffectTearGas
    - AdminInstantEffectEMP
    - RandomDiseaseRatsSpawn
    chance: 1
    offset: 0.2
  - type: TimedDespawn
    lifetime: 1


