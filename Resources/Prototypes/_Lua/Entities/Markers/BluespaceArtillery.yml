# CentCom bluespace artillery strike (admin placement marker)
- type: entity
  id: AdminInstantEffectBSA
  parent: MarkerBase
  name: instant effect
  suffix: BSA strike
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: AnnounceOnSpawn
    message: long-range-artillery-message
    sender: long-range-artillery-message-sender
    sound:
      path: /Audio/_Lua/Adminbuse/LongRangeArtillery.ogg
    color: orange
  - type: TimedSpawner
    prototypes:
    - AdminInstantEffectBSATarget
    chance: 1
    intervalSeconds: 9
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 10

- type: entity
  id: AdminInstantEffectBSATarget
  parent: MarkerBase
  name: instant effect
  suffix: BSA targeting
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: TimedSpawner
    prototypes:
    - AdminInstantEffectBSAShot
    chance: 1
    intervalSeconds: 1.1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 15
  - type: SpawnOnDespawn
    prototype: AdminInstantEffectBSAHit

- type: entity
  id: AdminInstantEffectBSAShot
  parent: MarkerBase
  name: instant effect
  suffix: BSA volley
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    offset: 30
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
  - type: TimedDespawn
    lifetime: 1

- type: entity
  id: AdminInstantEffectBSAHit
  parent: MarkerBase
  name: instant effect
  suffix: BSA impact
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    deleteAfterExplosion: false
    explosionType: Default
    totalIntensity: 3500
    intensitySlope: 15
    maxIntensity: 70
    canCreateVacuum: true
  - type: TriggerOnSpawn
  - type: TimedDespawn
    lifetime: 2
  - type: RadarBlip
    radarColor: "#d66800"
    scale: 3
    shape: Circle
    visibleFromOtherGrids: true
    requireNoGrid: false
    maxDistance: 4096
