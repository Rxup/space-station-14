#region вызов АДД
- type: entity
  name: моментальный эффект
  suffix: "АДД удар, BSA, Фронтир"
  id: AdminInstantEffectBSA
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: AnnounceOnSpawn
    message: long-range-artillery-message
    sender: long-range-artillery-message-sender
    sound:
      path: /Audio/_Lua/Adminbuse/LongRangeArtillery.ogg
    color: orange
  - type: TimedSpawner
    prototypes:
    - AdminInstantEffectBSATarget
    chance: 1
    intervalSeconds: 9
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 10

#region наводка АДД
- type: entity
  name: моментальный эффект
  suffix: "АДД наводка"
  id: AdminInstantEffectBSATarget
  categories: [ HideSpawnMenu ]
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Misc/torch.rsi
      state: icon
  - type: TimedSpawner
    prototypes:
    - AdminInstantEffectBSAShot
    chance: 1
    intervalSeconds: 1.1
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 15
  - type: SpawnOnDespawn
    prototype: AdminInstantEffectBSAHit

#region выстрел АДД
- type: entity
  name: моментальный эффект
  suffix: "АДД выстрел"
  id: AdminInstantEffectBSAShot
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    offset: 30
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
      - !type:EntSelector
        id: AdminInstantEffectBSAHit
  - type: TimedDespawn
    lifetime: 1

#region попадание АДД
- type: entity
  name: моментальный эффект
  suffix: "попадание АДД"
  parent: MarkerBase
  id: AdminInstantEffectBSAHit
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    deleteAfterExplosion: false # чтобы сам маркер взрыва был виден на сканере, её всё равно удалит таймер
    explosionType: Default
    totalIntensity: 3500
    intensitySlope: 15
    maxIntensity: 70
    canCreateVacuum: true
  - type: TriggerOnSpawn
  - type: TimedDespawn
    lifetime: 2
  - type: RadarBlip # красивый маркер взывов на сканере
    radarColor: "#d66800"
    scale: 3
    shape: Circle
    visibleFromOtherGrids: true
    requireNoGrid: false
    maxDistance: 4096