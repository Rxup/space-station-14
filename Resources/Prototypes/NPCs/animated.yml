# HTN for revenant Animate (Impstation/Delta-V intent; compounds were referenced in code but never upstreamed).
# AnimatedCuffService / AnimatedGrenadeService are utilityQuery prototypes (see hugbot.yml NearbyNeedingHug pattern).
# The UtilityService "id" field is only a cooldown label; "proto" must match a utilityQuery below.

- type: utilityQuery
  id: AnimatedCuffService
  query:
  - !type:NearbyHostilesQuery
  considerations:
  - !type:TargetIsAliveCon
    curve: !type:BoolCurve
  - !type:TargetDistanceCon
    curve: !type:PresetCurve
      preset: TargetDistance
  - !type:TargetHealthCon
    curve: !type:PresetCurve
      preset: TargetHealth
  - !type:TargetAccessibleCon
    curve: !type:BoolCurve
  - !type:TargetInLOSOrCurrentCon
    curve: !type:BoolCurve

- type: utilityQuery
  id: AnimatedGrenadeService
  query:
  - !type:NearbyHostilesQuery
  considerations:
  - !type:TargetIsAliveCon
    curve: !type:BoolCurve
  - !type:TargetDistanceCon
    curve: !type:PresetCurve
      preset: TargetDistance
  - !type:TargetHealthCon
    curve: !type:PresetCurve
      preset: TargetHealth
  - !type:TargetAccessibleCon
    curve: !type:BoolCurve
  - !type:TargetInLOSOrCurrentCon
    curve: !type:BoolCurve

- type: htnCompound
  id: AnimatedEscapeInventoryCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:AnimatedEscapeInventoryOperator

- type: htnCompound
  id: AnimatedHandcuffsCompound
  branches:
    - preconditions:
        - !type:InContainerPrecondition
          isInContainer: true
      tasks:
        - !type:HTNCompoundTask
          task: AnimatedEscapeInventoryCompound
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: AnimatedCuffService
        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            pathfindInPlanning: true
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            rangeKey: InteractRange
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: InteractRange
          operator: !type:AnimatedHandcuffOperator
            targetKey: Target
            expectDoAfter: true
          services:
            - !type:UtilityService
              id: AnimatedCuffService
              proto: AnimatedCuffService
              key: Target
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: htnCompound
  id: AnimatedGrenadeCompound
  branches:
    - preconditions:
        - !type:InContainerPrecondition
          isInContainer: true
      tasks:
        - !type:HTNCompoundTask
          task: AnimatedEscapeInventoryCompound
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: AnimatedGrenadeService
        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            pathfindInPlanning: true
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            rangeKey: InteractRange
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: InteractRange
          operator: !type:AnimatedGrenadeOperator
            targetKey: Target
            rangeKey: InteractRange
          services:
            - !type:UtilityService
              id: AnimatedGrenadeService
              proto: AnimatedGrenadeService
              key: Target
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound
