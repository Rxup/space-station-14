# Nubody organ sets and body fills for NPCs / non-roundstart mobs.
# Rule: do NOT add BodyComponent.prototype or - type: body graphs — use InitialBody or EntityTableContainerFill only.

# --- Simple animal internal fills (EntityTableContainerFill) ---

- type: entity
  id: BaseMobNpcAnimalFill
  abstract: true
  components:
  - type: Body
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganAnimalLungs
        - id: OrganAnimalHeart
        - id: OrganAnimalStomach
        - id: OrganAnimalLiver
        - id: OrganAnimalKidneys

- type: entity
  id: BaseMobNpcCarpFill
  abstract: true
  components:
  - type: Body
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganSpaceAnimalLungs
        - id: OrganSpaceAnimalHeart
        - id: OrganAnimalStomach
        - id: OrganAnimalLiver
        - id: OrganAnimalKidneys

