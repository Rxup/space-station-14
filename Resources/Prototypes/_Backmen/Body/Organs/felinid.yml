- type: entity
  parent: SolutionStomach
  id: SolutionStomachFelinid
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      maxVol: 20

- type: entity
  id: OrganFelinidStomach
  parent: OrganReptilianStomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Stomach
  - type: SolutionManager
    solutions:
    - SolutionStomachFelinid
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10

- type: entity
  parent: OrganHumanExternal
  id: OrganFelinidExternal
  abstract: true
  components:
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganFelinidExternal ]
  id: OrganFelinidTorso
  components:
  - type: VisualOrganMarkings
    markingData:
      group: Felinid
      layers:
      - Chest
      - Tail
      - Overlay
      - TailOverlay
      - Special

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganFelinidExternal ]
  id: OrganFelinidHead
  components:
  - type: VisualOrganMarkings
    markingData:
      group: Felinid
      layers:
      - Head
      - Hair
      - FacialHair
      - Snout
      - SnoutCover
      - HeadSide
      - HeadTop
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
