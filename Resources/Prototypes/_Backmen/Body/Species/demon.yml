    state: torso_m
  - type: VisualOrgan
    data:
      state: torso_m
    sexStateOverrides:
      Male: torso_m
      Female: torso_f

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganDemonExternal ]
  id: OrganDemonHead
