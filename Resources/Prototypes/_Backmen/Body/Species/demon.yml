- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceDemon
  name: demon appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganDemonTorso
      Head: OrganDemonHead
      ArmLeft: OrganDemonArmLeft
      ArmRight: OrganDemonArmRight
      HandRight: OrganDemonHandRight
      HandLeft: OrganDemonHandLeft
      LegLeft: OrganDemonLegLeft
      LegRight: OrganDemonLegRight
      FootLeft: OrganDemonFootLeft
      FootRight: OrganDemonFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganAnimalLungs
      Heart: OrganAnimalHeart
      Stomach: OrganDemonStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Demon
  - type: Inventory
    speciesId: human

- type: entity
  parent:
  - AppearanceDemon
  - BaseSpeciesMobSurgery
  id: MobDemon
  name: Urist McDemon
  components:
  - type: HumanoidProfile
    species: Demon
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: Consciousness
    capBonus: 20
    damageContainer: RaceDemon
  - type: MobThresholds
    thresholds:
      0: Alive
      70: Critical
      200: Dead
  - type: LanguageKnowledge
    speaks:
    - Carshnil
    - TauCetiBasic
    understands:
    - TauCetiBasic
    - Carshnil
  - type: Icon
    sprite: _ADT/Mobs/Demon/parts.rsi
    state: full_m
  - type: Hunger
  - type: Thirst
  - type: Speech
    speechSounds: Lizard
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: FemaleHuman
  - type: Damageable
    damageModifierSet: RaceDemon
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Piercing: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 400
    coldDamageThreshold: 193
    coldDamage:
      types:
        Cold: 0.1
    heatDamage:
      types:
        Heat: 0.3
  - type: Perishable
  - type: FootPrints
    leftBarePrint: footprint-left-bare-lizard
    rightBarePrint: footprint-right-bare-lizard
  - type: NpcFactionMember
    factions:
    - NanoTrasen

- type: entity
  parent: MobDemon
  id: MobDemonDummy
  categories: [ HideSpawnMenu ]
  name: Urist McDemon
  description: A dummy demon meant to be used in character setup.
  components:
  - type: HumanoidProfile
    species: Demon

- type: entity
  parent: OrganBaseOrganic
  id: OrganDemon
  abstract: true
  suffix: demon

- type: entity
  id: OrganDemonVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: _ADT/Mobs/Demon/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Demon

- type: entity
  parent: [ OrganDemon, OrganDemonVisual ]
  id: OrganDemonExternal
  abstract: true
  components:
