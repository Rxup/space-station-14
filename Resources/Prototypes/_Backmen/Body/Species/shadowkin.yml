- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceShadowkin
  name: shadowkin appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganShadowkinTorso
      Head: OrganShadowkinHead
      ArmLeft: OrganShadowkinArmLeft
      ArmRight: OrganShadowkinArmRight
      HandRight: OrganShadowkinHandRight
      HandLeft: OrganShadowkinHandLeft
      LegLeft: OrganShadowkinLegLeft
      LegRight: OrganShadowkinLegRight
      FootLeft: OrganShadowkinFootLeft
      FootRight: OrganShadowkinFootRight
      Brain: OrganShadowkinBrain
      Eyes: OrganShadowkinEyes
      Tongue: OrganShadowkinTongue
      Appendix: OrganShadowkinAppendix
      Ears: OrganShadowkinEars
      Lungs: OrganHumanLungs
      Heart: OrganShadowkinHeart
      Stomach: OrganShadowkinStomach
      Liver: OrganShadowkinLiver
      Kidneys: OrganShadowkinKidneys
  - type: HumanoidProfile
    species: Shadowkin
  - type: Inventory
    speciesId: human

- type: entity
  parent:
  - AppearanceShadowkin
  - BaseSpeciesMobSurgery
  id: MobShadowkin
  name: Urist McFloof
  components:
  - type: HumanoidProfile
    species: Shadowkin
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: Consciousness
    capBonus: 20
  - type: MobThresholds
    thresholds:
      0: Alive
      110: Critical
      200: Dead
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - Shadokin
    understands:
    - TauCetiBasic
    - Shadokin
  - type: ShadowkinAccent
  - type: Hunger
  - type: Icon
    sprite: Backmen/Mobs/Species/Shadowkin/parts.rsi
    state: full
  - type: Flammable
    damage:
      types:
        Heat: 0.75
  - type: Damageable
    damageModifierSet: Shadowkin
  - type: Injurable
    damageContainer: Biological
  - type: Barotrauma
    damage:
      types:
        Blunt: 1
  - type: Bloodstream
    bloodlossDamage:
      types:
        Bloodloss: 1
    bloodlossHealDamage:
      types:
        Bloodloss: -0.25
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 330
    coldDamageThreshold: 195
    coldDamage:
      types:
        Cold: 0.05
    heatDamage:
      types:
        Heat: 0.25
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Sprite
    scale: 0.85, 0.85
  - type: Eye
    zoom: "0.85, 0.85"
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 2
        Slash: 3
        Piercing: 1
  - type: Shadowkin
  - type: ShadowkinDarkSwapPower
  - type: ShadowkinRestPower
  - type: ShadowkinTeleportPower
  - type: Vocal
    sounds:
      Male: MaleSlime
      Female: FemaleSlime
      Unsexed: MaleSlime
  - type: InteractionPopup
    successChance: 0.75
    interactFailureString: petting-failure-generic
    interactSuccessString: petting-success-soft-floofy
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: petting-success-soft-floofy-others
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.7
    baseSprintSpeed: 4.5
  - type: PotentialPsionic
    chance: -200
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: NpcFactionMember
    factions:
    - NanoTrasen

