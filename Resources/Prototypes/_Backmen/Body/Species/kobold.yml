- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceKobold
  name: kobold appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganKoboldTorso
      Head: OrganKoboldHead
      ArmLeft: OrganKoboldArmLeft
      ArmRight: OrganKoboldArmRight
      HandRight: OrganKoboldHandRight
      HandLeft: OrganKoboldHandLeft
      LegLeft: OrganKoboldLegLeft
      LegRight: OrganKoboldLegRight
      FootLeft: OrganKoboldFootLeft
      FootRight: OrganKoboldFootRight
      Brain: OrganAnimalBrain
      Eyes: OrganKoboldEyes
      Lungs: OrganAnimalLungs
      Heart: OrganAnimalHeart
      Stomach: OrganAnimalStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganAnimalKidneys
  - type: HumanoidProfile
    species: Kobold
  - type: Inventory
    templateId: monkey
    speciesId: monkey

- type: entity
  parent:
  - AppearanceKobold
  - BaseSpeciesMobSurgery
  id: MobKoboldPlayer
  name: kobold
  description: Cousins to the sentient race of lizard people, kobolds blend in with their natural habitat.
  components:
  - type: HumanoidProfile
    species: Kobold
  - type: LanguageSpeaker
    currentLanguage: Kobold
  - type: LanguageKnowledge
    speaks:
    - Kobold
    understands:
    - Kobold
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: Vocal
    sounds:
      Male: MaleReptilian
      Female: FemaleReptilian
      Unsexed: MaleReptilian
  - type: Clumsy
    gunShootFailDamage:
      types:
        Blunt: 2
        Piercing: 7
        Heat: 3
    catchingFailDamage:
      types:
        Blunt: 1
    clumsySound:
      path: /Audio/Voice/Reptilian/reptilian_scream.ogg
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 80
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
        Piercing: 4
  - type: Puller
    needsHands: false
  - type: Crawler
  - type: Damageable
  - type: Injurable
    damageContainer: Biological
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42

- type: entity
  parent: MobKoboldPlayer
  id: MobKoboldDummy
  categories: [ HideSpawnMenu ]
  name: kobold
  description: A dummy kobold meant to be used in character setup.
  components:
  - type: HumanoidProfile
    species: Kobold
  - type: Icon
    sprite: Mobs/Animals/kobold.rsi
    state: full

- type: entity
  parent: OrganBase
  id: OrganKobold
  abstract: true
  suffix: kobold

- type: entity
  id: OrganKoboldVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Animals/kobold.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Kobold

- type: entity
  parent: [ OrganKobold, OrganKoboldVisual ]
  id: OrganKoboldExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Animals/kobold.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganKoboldExternal ]
  id: OrganKoboldTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganKoboldExternal ]
  id: OrganKoboldHead
