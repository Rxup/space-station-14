    organs:
      Torso: OrganHumanoidFoxTorso
      Head: OrganHumanoidFoxHead
      ArmLeft: OrganHumanoidFoxArmLeft
      ArmRight: OrganHumanoidFoxArmRight
      HandRight: OrganHumanoidFoxHandRight
      HandLeft: OrganHumanoidFoxHandLeft
      LegLeft: OrganHumanoidFoxLegLeft
      LegRight: OrganHumanoidFoxLegRight
      FootLeft: OrganHumanoidFoxFootLeft
      FootRight: OrganHumanoidFoxFootRight
      Brain: OrganVulpkaninBrain
      Eyes: OrganHumanoidFoxEyes
      Tongue: OrganVulpkaninTongue
      Appendix: OrganVulpkaninAppendix
      Ears: OrganVulpkaninEars
      Lungs: OrganVulpkaninLungs
      Heart: OrganVulpkaninHeart
      Stomach: OrganVulpkaninStomach
      Liver: OrganVulpkaninLiver
      Kidneys: OrganVulpkaninKidneys
