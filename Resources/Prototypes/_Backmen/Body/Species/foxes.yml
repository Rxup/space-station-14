- type: entity
  parent:
  - AppearanceHumanoidFox
  - BaseSpeciesMobSurgery
  id: MobHumanoidFox
  name: Urist McFox
  components:
  - type: HumanoidProfile
    species: HumanoidFoxes
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - Canilunzt
    understands:
    - TauCetiBasic
    - Canilunzt
    - Dog
  - type: Icon
    sprite: Backmen/Mobs/Species/HumanoidFox/parts.rsi
    state: full
  - type: ContentEye
    targetZoom: "1.125, 1.125"
    maxZoom: "1.125, 1.125"
  - type: GrowlingAccent
  - type: MeleeWeapon
    animation: WeaponArcClaw
    soundHit:
      collection: AlienClaw
    damage:
      types:
        Slash: 5
  - type: DiseaseCarrier
    naturalImmunities:
    - FurryVirus
    - FurryVirusPlus
  - type: Hunger
    thresholds:
      Overfed: 250
      Okay: 200
      Peckish: 150
      Starving: 100
      Dead: 0
    baseDecayRate: 0.02
  - type: Thirst
    thresholds:
      OverHydrated: 650
      Okay: 500
      Thirsty: 350
      Parched: 200
      Dead: 0
    baseDecayRate: 0.15
  - type: LightweightDrunk
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Vulpkanin
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2.0
    damageRecovery:
      types:
        Asphyxiation: -2.0
  - type: Wagging
  - type: Vocal
    sounds:
      Male: MaleFoxes
      Female: FemaleFoxes
      Unsexed: MaleFoxes
  - type: PotentialPsionic
  - type: FootPrints
    leftBarePrint: footprint-left-bare-lizard
    rightBarePrint: footprint-right-bare-lizard
  - type: NpcFactionMember
    factions:
    - NanoTrasen

- type: entity
  parent: MobHumanoidFox
  id: MobHumanoidFoxDummy
