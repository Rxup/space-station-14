      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
    relationships:
      Torso:
      - Head
      - ArmLeft
      - ArmRight
      - ArachneAbdomen
      - ArachneFront
      - Appendix
      - Lungs
      - Heart
      - Stomach
      - Liver
      - Kidneys
      Head:
      - Brain
      - Eyes
      - Tongue
      - Ears
      ArmLeft:
      - HandLeft
      ArmRight:
      - HandRight
      ArachneAbdomen:
      - SpiderLegLeft1
      - SpiderLegLeft2
      - SpiderLegLeft3
      - SpiderLegLeft4
      ArachneFront:
      - SpiderLegRight1
      - SpiderLegRight2
      - SpiderLegRight3
      - SpiderLegRight4
