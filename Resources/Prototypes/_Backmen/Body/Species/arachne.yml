    requiredLegs: 8
  - type: HumanoidProfile
    species: ArachneClassic
  - type: Inventory
    templateId: anytaur
  - type: Arachne
  - type: ArachneClothingStencil

- type: entity
  parent:
  - AppearanceArachneClassic
  - BaseSpeciesMobSurgery
  id: MobArachneClassic
  name: Player ArachneClassic
  components:
  - type: HumanoidProfile
    species: ArachneClassic
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - Spider
    understands:
    - TauCetiBasic
    - Spider
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 140
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: HalfSpirit
  - type: Consciousness
    damageContainer: HalfSpirit
  - type: Speech
    speechSounds: Alto
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 1
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Tag
    tags:
    - CanPilot
    - DoorBumpOpener
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: DemonsBlood
        Quantity: 300
  - type: BloodSucker
    webRequired: true
  - type: Arachne
  - type: Cocooner
  - type: MovedByPressure
    pressureResistance: 4
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.07
  - type: MovementAlwaysTouching
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.0
    baseSprintSpeed: 5.0
  - type: Perishable
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Generic_mob_burning
    alternateState: arachne_standing
    fireStackAlternateState: 3
  - type: Dna
    dna: ABRAXAS
  - type: Spider
    webPrototype: SpiderWebArache
    webAction: SpiderWebArachneClassicAction
  - type: IgnoreSpiderWebArachneClassic
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: NpcFactionMember
    factions:
    - NanoTrasen

