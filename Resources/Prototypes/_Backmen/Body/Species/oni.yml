      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ OniHornSingleCurved ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceOni
  name: oni appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganHumanTorso
      Head: OrganHumanHead
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Oni
  - type: Inventory
    speciesId: human

- type: entity
  parent:
  - AppearanceOni
  - BaseSpeciesMobSurgery
  id: MobOni
  name: Urist McOni
  components:
  - type: HumanoidProfile
    species: Oni
  - type: Hunger
  - type: Thirst
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - Nekomimetic
    understands:
    - TauCetiBasic
    - Nekomimetic
  - type: Speech
    speechSounds: Baritone
  - type: Sprite
    scale: 1.2, 1.2
  - type: Oni
    modifiers:
      coefficients:
        Blunt: 1.35
        Slash: 1.2
        Piercing: 1.2
        Asphyxiation: 1.35
  - type: Damageable
    damageModifierSet: Oni
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.42
        density: 220
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Stamina
    baseCritThreshold: 115
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: FootPrints
  - type: NpcFactionMember
    factions:
    - NanoTrasen

- type: entity
  parent: MobOni
  id: MobOniDummy
  categories: [ HideSpawnMenu ]
  name: Urist McOni
  components:
  - type: HumanoidProfile
    species: Oni
  description: A dummy oni meant to be used in character setup.
