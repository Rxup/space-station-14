- type: entityTable
  id: ShipwreckGuaranteedScrewdriver
  table: !type:GroupSelector
    children:
    - id: Screwdriver

- type: entityTable
  id: ShipwreckDungeonToolsTable
  table: !type:GroupSelector
    children:
    - id: Screwdriver
    - id: Wrench
    - id: Crowbar
    - id: Wirecutter
    - id: FlashlightLantern
    - id: Flare
    - id: Welder
      weight: 0.5
    - id: Multitool
      weight: 0.3
    - id: Shovel
      weight: 0.5
    - id: SurvivalKnife
      weight: 0.5
    - id: FireExtinguisher
      weight: 0.4

- type: entityTable
  id: ShipwreckDrawerFill
  table: !type:GroupSelector
    rolls: !type:RangeNumberSelector
      range: 1, 3
    children:
    - id: Gauze
    - id: Brutepack
    - id: Ointment
    - id: FlashlightLantern
    - id: Flare
    - id: Pen
    - id: Paper

- type: entityTable
  id: ShipwreckWashingMachineFill
  table: !type:GroupSelector
    rolls: !type:RangeNumberSelector
      range: 1, 2
    children:
    - id: Soap
    - id: ClothingUniformJumpsuitColorGrey
    - id: ClothingUniformJumpsuitColorBlack
    - id: ClothingShoesColorBlack
    - id: ClothingMaskBreath
    - id: ClothingNeckScarfStripedBlue
    - id: ClothingHeadBandSkull
