- type: antag
  id: Blob
  name: roles-antag-blob-name
  antagonist: true
  setPreference: true
  objective: roles-antag-blob-objective
  guides: [ Blob ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 54000 # 15h # Corvax-RoleTime
  discordRequired: true # backmen: antag

- type: antagSpecifier
  parent: RestrictedAntag
  id: Blob
  prefRoles:
  - Blob
  allowNonHumans: true
  blacklist:
    components:
    - AntagImmune
  components:
  - type: BlobCarrier
  briefing:
    text: blob-carrier-role-greeting
    color: Plum
    sound: /Audio/Backmen/Ambience/Antag/blob_start.ogg
  mindRoles:
  - MindRoleBlob

- type: antag
  id: XenoAgent
  name: roles-antag-XenoAgent-name
  antagonist: true
  setPreference: true
  objective: roles-antag-XenoAgent-objective
  guides: [  ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 540000 # 150h
  discordRequired: true # backmen: antag

- type: antagSpecifier
  parent: RestrictedAntag
  id: XenoAgent
  prefRoles:
  - XenoAgent
  allowNonHumans: true
  blacklist:
    components:
    - AntagImmune
  components:
  - type: XenoAgent
