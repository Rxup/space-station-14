- type: gameMap
  id: BackmenShoukou
  mapName: 'Shōkō'
  mapPath: /Maps/Backmen/backmen_shoukou.yml
  minPlayers: 0
  maxPlayers: 35
  stations:
    Shoukou:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Сёко {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_box.yml
        - type: StationJobs
          availableJobs:
          #Командование
            Captain: [ 1, 1 ] # Капитан
            HeadOfPersonnel: [ 1, 1 ] # Глава персонала
            ChiefEngineer: [ 1, 1 ] # Старший инженер
            ChiefMedicalOfficer: [ 1, 1 ] # Главный врач
            HeadOfSecurity: [ 1, 1 ] # Глава службы безопасности
            Quartermaster: [ 1, 1 ] # Квартирмейстер
            ResearchDirector: [ 1, 1 ] # Научный руководитель
            IAA: [ 1, 1 ] # Агент внутрених дел

          #Центральное Командование
            BlueShield: [1, 1] # Backmen Офицер "Синий Щит"

          #Юридический отдел
            # Агент внутрених дел
            # Возможный адвокат в будующем

          #Служба безопасности
            # Глава службы безопасности
            Warden: [ 1, 1 ] # Смотритель
            Detective: [ 1, 1 ] # Детектив
            Brigmedic: [ 1, 1 ] # Backmen Бригмедик
            SecurityOfficer: [ 3, 4 ] # Офицер службы безопасности
            SecurityCadet: [ 3, 4 ] # Кадет службы безопасности
            Prisoner: [ 2, 3] # Заключённый

          #Сервисный отдел
            # Глава персонала
            Bartender: [ 1, 2 ] # Бармен
            Botanist: [ 1, 2 ] # Батаник
            Chef: [ 1, 2 ] # Шеф повар
            Janitor: [ 2, 3 ] # Уборщик
            Chaplain: [ 1, 1 ] # Священник
            Librarian: [ 1, 1 ] # Библиотекарь
            ServiceWorker: [ 1, 1 ] # Сервисный работник
            Passenger: [ -1, -1 ] # Ассистент
            Clown: [ 1, 1 ] # Клоун
            Mime: [ 1, 1 ] # Мим
            Musician: [ 1, 1 ] # Музыкан

          #Инженерный отдел
            # Старший инженер
            AtmosphericTechnician: [ 2, 2 ] # Атмосферный техник
            StationEngineer: [ 3, 4 ] # Инженер
            TechnicalAssistant: [ 3, 4 ] # Технический ассистенит

          #Медицинский отдел
            # Главный врач
            Paramedic: [ 1, 1 ] # Парамедик
            Chemist: [ 2, 2 ] # Химик
            BkmVirologist: [1, 1] # Backmen Вирусолог
            BkmSurgeon: [1, 1] # Backmen Хирург
            MedicalDoctor: [ 3, 4 ] # Врач
            MedicalIntern: [ 2, 3 ] # Интерн
            Psychologist: [ 0, 0 ] # Психолог (На данной карте отсуствует)

          #Научный отдел
            # Научный руководитель
            Roboticist: [ 1, 1 ] #Робототехник
            Scientist: [ 3, 4 ] # Ученый
            ResearchAssistant: [ 2, 3 ] # Научный ассистенит

          #Синтетики
            StationAi: [ 1, 1 ] # Центральный искусственный интеллект
            BKBPLATech: [1, 1] # Backmen Инженерный дрон
            BKBPLAMED: [1, 1] # Backmen Медицинский дрон
            Borg: [ 4, 4 ] # Киборг

          #Отдел снабжения
            # Квартирмейстер
            # Возможный шахтер в будующем
            SalvageSpecialist: [ 3, 3 ] # Утилизатор
            CargoTechnician: [ 2, 3 ] # Грузчик

        # backmen blob-config-start SMALL+
        - type: StationBlobConfig
          stageBegin: 25
          stageCritical: 350
          stageTheEnd: 700
        # backmen blob-config-end
