- type: entity
  parent: SurgeryBase
  id: SurgeryGraftArachneAbdomen
  name: Graft Spider Abdomen
  categories: [ HideSpawnMenu ]
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepClampBleeders
    - SurgeryStepSawBones
    - SurgeryStepPriseOpenBones
    - SurgeryStepClampInternalBleeders
    - SurgeryStepInsertFeature
    - SurgeryStepCloseBones
    - SurgeryStepSealWounds
  - type: SurgeryPartCondition
    part: Chest
  - type: SurgeryTraumaPresentCondition
    inverted: true
    trauma: Dismemberment
  - type: SurgeryOrganCategoryMissingCondition
    category: ArachneAbdomen
    inverse: true
  - type: SurgeryOrganGraftAttach
    requiredCategory: ArachneAbdomen
    prerequisiteCategory: ArachneFront

