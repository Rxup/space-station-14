# All the Harpy customization

# Ears Markings
- type: marking
  id: HarpyWingDefault
  bodyPart: RArm
  groupWhitelist: [Harpy]
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
        - !type:SimpleColoring
          color: "#964b00"
  sprites:
    - sprite: Backmen/Mobs/Customization/Harpy/harpy_wings.rsi
      state: harpy

