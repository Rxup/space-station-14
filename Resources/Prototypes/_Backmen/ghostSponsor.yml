- type: ghostTheme
  id: tier1
  name: sponsor-win-manager-ghost-tier1
  components:
    - type: Sprite
      noRot: true
      overrideContainerOcclusion: true # Ghosts always show up regardless of where they're contained.
      drawdepth: Ghosts
      sprite: Backmen/Mobs/Ghost/ghost_red.rsi
      color: "#fff8"
      layers:
      - state: animated-red
        shader: unshaded
        map: [ "ghostVariant" ]

