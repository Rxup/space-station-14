- type: reagent
  id: TranexamicAcidPlus
  name: reagent-name-tranexamic-acid-plus
  group: Medicine
  desc: reagent-desc-tranexamic-acid-plus
  physicalDesc: reagent-physical-desc-viscous
  flavor: medicine
  color: "#ba7d7d"
  metabolisms:
    Bloodstream:
      effects:
      - !type:ModifyBleed
        amount: -1
      - !type:HealthChange
        conditions:
        - !type:MobStateCondition
          mobstate: Critical
        - !type:ReagentCondition
          reagent: TranexamicAcidPlus
          min: 0
          max: 20
        damage:
          types:
            Blunt: -1.25
            Slash: -1.25
            Piercing: -1.25
            ArmorPiercing: -1.25
            Heat: -1.25
            Shock: -1.25
            Cold: -1.25
            Caustic: -1.25
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: TranexamicAcidPlus
          min: 0
          max: 20
        damage:
          types:
            Asphyxiation: -3
            Poison: -0.5
            Bloodloss: -2
            Radiation: -1
            Blunt: -0.075
            Slash: -0.075
            Piercing: -0.075
            ArmorPiercing: -0.075
            Heat: -0.075
            Shock: -0.075
            Cold: -0.075
            Caustic: -0.075
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 0.75
        type: Remove
      - !type:ModifyKnockdown
        time: 0.75
        type: Remove

