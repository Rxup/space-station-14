- type: entity
  id: HealingSpell
  parent: BaseAction
  name: action-name-spell-healing
  description: action-description-spell-healing
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/staff_healing.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: magicmissile

  - type: EntityTargetAction
    whitelist:
      components:
      - Body
    canTargetSelf: true
    event: !type:HealSpellEvent
      healAmount:
        types:
          Blunt: -249.75
          Slash: -249.75
          Piercing: -249.75
          ArmorPiercing: -249.75
          Heat: -249.75
          Shock: -249.75
          Cold: -249.75
          Caustic: -249.75
          Asphyxiation: -499.5
          Bloodloss: -499.5
          Poison: -499.5
          Radiation: -499.5
      speech: action-speech-spell-healing
  - type: TargetAction
    range: 64
    interactOnMiss: false
