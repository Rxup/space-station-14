# Blob
- type: entity
  id: BlobRule
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: BlobRule

- type: entity
  id: BlobGameMode
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: GameRule
    minPlayers: 20
    delay: # 7-10 minutes
      min: 420
      max: 600
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Blob
      playerRatio: 40
      range:
        min: 1
        max: 2

- type: entity
  id: BlobSpawn
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: StationEvent
    weight: 5
    duration: 1
    earliestStart: 50
    minimumPlayers: 20
    maxOccurrences: 2
  - type: BlobSpawnRule
    carrierBlobProtos:
    - SpawnPointGhostBlobRat
    playersPerCarrierBlob: 30
    maxCarrierBlob: 2

# Vampire
- type: entity
  id: BaseVampiresGameRule
  abstract: true
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: BloodsuckerRule
  - type: AntagObjectives
    objectives:
    - EscapeShuttleObjectiveBloodsucker
    - BloodsuckerDrinkObjective
    - BloodsuckerConvertObjective
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Bloodsucker
      playerRatio: 10
      range:
        min: 2
        max: 8

## Vampire Gamemode
- type: entity
  id: VampiresGameRule
  parent: BaseVampiresGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: GameRule
    minPlayers: 15
    delay:
      min: 30
      max: 60

## Vampire Outbreak
- type: entity
  id: VampireOutbreak
  parent: BaseVampiresGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: GameRule
    minPlayers: 15
  - type: StationEvent
    earliestStart: 20
    minimumPlayers: 15
    weight: 5
    maxOccurrences: 1 # can only happen once per round
    startAnnouncement: station-event-communication-interception
    startAudio:
      path: /Audio/Announcements/intercept.ogg
    duration: null # the rule has to last the whole round not 1 second
    occursDuringRoundEnd: false

# Shipwrecked
- type: entity
  id: Shipwrecked
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
    - type: GameRule
      minPlayers: 1
    - type: ShipwreckedRule
      spawnPointTraveller: SpawnPointShipwreckTraveller
      availableJobs:
        - Explorer
        - Freelancer
        - Student
      destinations:
        - DesertWastes
        - FrozenWastes
        - Jungle
        - Continental
        #- Lava
        - RuinedMegacity
      spawnPointHecate: SpawnPointShipwreckHecate
      hecatePrototype: MobQuestHecateShipwrecked
      eventSchedule:
        - 13: AnnounceTransit
        - 9: ShowHecate
        - 1: IntroduceHecate
        - 160: EncounterTurbulence
        - 10: ShiftParallax
        - 60: MidFlightDamage
        - 6: Alert
        - 16: DecoupleEngine
        - 14: SendDistressSignal
        - 16: InterstellarBody
        - 16: EnteringAtmosphere
        - 6: Crash
        - 6: AfterCrash
        - 12: Sitrep

- type: gameMapPool
  id: ShipwreckedPool
  maps:
    - ShwrAdventurer
    - ShwrBig
    - shwrDust

- type: entity
  parent: BaseGameRule
  id: ExtendedThief
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    - groups: ThiefBigObjectiveGroups
      prob: 0.4
      maxPicks: 2
    maxDifficulty: 3.5
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: ExtendedThief
      playerRatio: 7
      range:
        min: 1
        max: 10

- type: entity
  parent: BaseGameRule
  id: BabelTower
  components:
  - type: GameRule
  - type: BabelTowerRule

