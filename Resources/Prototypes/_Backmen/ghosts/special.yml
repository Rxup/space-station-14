- type: ghostTheme
  id: Luna
  name: sponsor-win-manager-ghost-Luna
  components:
  - type: Sprite
    noRot: true
    overrideContainerOcclusion: true # Ghosts always show up regardless of where they're contained.
    drawdepth: Ghosts
    sprite: Backmen/Mobs/Ghost/luna.rsi
    layers:
      - state: pony
        map: [ "ghostVariant" ]
        shader: unshaded

