      content: >-
        [head=2] Медицинская памятка по препаратам [/head] 


        [bold]Цвет ██[bullet]Название {Передозировка}  - [color=#5aaf5f]Вылечит повреждений за 10u[/color] / Время усвоения 10u [color=#bc575f]Побочка [/color]


        [color=#f4b084]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

        [head=2]Механические повреждения[/head][/color]

        [color=#ffaa00]██[/color][bullet]Бикаридин  {15u}   [color=#5aaf5f]  -30 мех.[/color]           / 20 с. 
                 [italic]Равно распределит между уш., пор. и ук.[/italic]
        [color=#ff3636]██[/color][bullet]Бруизин      {10,5u}  [color=#5aaf5f] -90 ушибы[/color]     / 40 с.

        [color=#283332]██[/color][bullet]Лацеринол  {12u}    [color=#5aaf5f] -80 порезы[/color]   / 40 с. / [color=#bc575f]+8 терм.[/color] 

        [color=#b9bf93]██[/color][bullet]Пунктураз    {12u}    [color=#5aaf5f] -100 уколы[/color]  / 40 с. / [color=#bc575f]+2 рад.[/color] 


        [color=#d20000]!!! СМЕШИВАНИЕ ЭТИХ ЛЕКАРСТВ ДАЁТ ОПАСНЫЙ ТОКСИН !!!

        [/color][color=#abd5d7]██[/color][bullet]БРИТВИУМ - [color=#bc575f]наносит порезы и кровотечение[/color]


        [color=#ffc000]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

        [head=2]Физические (ожоги) повреждения[/head][/color]

        [color=#aa4308]██[/color][bullet]Пиразин    {20u}  [color=#5aaf5f]-100 термические[/color]    / 100 с.

        [color=#8147ff]██[/color][bullet]Инсузин     {12u}  [color=#5aaf5f]-60 электрические[/color]  / 40 с.

        [color=#ff7db5]██[/color][bullet]Лепоразин  {-}     [color=#5aaf5f]-80 обморожение[/color]   / 20 с.

        [color=#e0a5b9]██[/color][bullet]Сигинат      {16u}  [color=#5aaf5f]-50 кислотные[/color]         / 40 с. 


        [color=#00b0f0]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀

        [head=2]Нехватка воздуха[/head][/color]

        [color=#4da0bd]██[/color][bullet]Дексалин+    {25u} [color=#5aaf5f]-70 удуш.-60 кровопотеря[/color] / 20 с.

        [color=#ba7d7d]██[/color][bullet]Транексамовая кислота {15u}  
                [italic] Ослабляет кровотечение[/italic]                               / 20 с. 
        [color=#0064c8]██[/color][bullet]Физраствор {-} [italic]Повышает уровень крови в организме[/italic]
